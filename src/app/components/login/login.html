<div class="min-vh-100 d-flex align-items-center justify-content-center login-bg">
  <div class="card shadow-lg login-card">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="brand-icon mb-3">👥</div>
        <h2 class="fw-bold text-primary">Employee Management</h2>
        <p class="text-muted">Sign in to your account</p>
      </div>

      <div *ngIf="error" class="alert alert-danger alert-dismissible fade show">
        {{ error }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username or Email</label>
          <input
            type="text"
            class="form-control form-control-lg"
            formControlName="usernameOrEmail"
            placeholder="Enter username or email"
            [class.is-invalid]="loginForm.get('usernameOrEmail')?.invalid && loginForm.get('usernameOrEmail')?.touched"
          >
          <div class="invalid-feedback">Username or email is required.</div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input
            type="password"
            class="form-control form-control-lg"
            formControlName="password"
            placeholder="Enter password"
            [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          >
          <div class="invalid-feedback">Password must be at least 6 characters.</div>
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-lg w-100"
          [disabled]="loginForm.invalid || loading"
        >
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center mb-0">
        Don't have an account?
        <a routerLink="/signup" class="text-primary fw-semibold text-decoration-none">Create Account</a>
      </p>
    </div>
  </div>
</div>
