<div class="min-vh-100 d-flex align-items-center justify-content-center signup-bg">
  <div class="card shadow-lg signup-card">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="brand-icon mb-3">✨</div>
        <h2 class="fw-bold text-primary">Create Account</h2>
        <p class="text-muted">Register to get started</p>
      </div>

      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
      <div *ngIf="success" class="alert alert-success">{{ success }}</div>

      <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input
            type="text"
            class="form-control form-control-lg"
            formControlName="username"
            placeholder="Choose a username"
            [class.is-invalid]="signupForm.get('username')?.invalid && signupForm.get('username')?.touched"
          >
          <div class="invalid-feedback">Username must be at least 3 characters.</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input
            type="email"
            class="form-control form-control-lg"
            formControlName="email"
            placeholder="Enter your email"
            [class.is-invalid]="signupForm.get('email')?.invalid && signupForm.get('email')?.touched"
          >
          <div class="invalid-feedback">A valid email address is required.</div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input
            type="password"
            class="form-control form-control-lg"
            formControlName="password"
            placeholder="Create a password"
            [class.is-invalid]="signupForm.get('password')?.invalid && signupForm.get('password')?.touched"
          >
          <div class="invalid-feedback">Password must be at least 6 characters.</div>
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-lg w-100"
          [disabled]="signupForm.invalid || loading"
        >
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Creating account...' : 'Create Account' }}
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center mb-0">
        Already have an account?
        <a routerLink="/login" class="text-primary fw-semibold text-decoration-none">Sign In</a>
      </p>
    </div>
  </div>
</div>
